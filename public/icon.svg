<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="50%" style="stop-color:#3C3B6E"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7CC"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Decorative ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.2"/>

  <!-- Trophy -->
  <g transform="translate(256, 256)">
    <!-- Trophy cup -->
    <path d="M -70,-100 L 70,-100 L 65,-30 Q 60,30 0,40 Q -60,30 -65,-30 Z"
          fill="url(#trophyGrad)" stroke="#B8860B" stroke-width="2"/>

    <!-- Trophy handles -->
    <path d="M -70,-80 Q -110,-60 -110,-20 Q -110,10 -80,10"
          fill="none" stroke="url(#trophyGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 70,-80 Q 110,-60 110,-20 Q 110,10 80,10"
          fill="none" stroke="url(#trophyGrad)" stroke-width="8" stroke-linecap="round"/>

    <!-- Trophy stem -->
    <rect x="-15" y="40" width="30" height="40" fill="url(#trophyGrad)"/>

    <!-- Trophy base -->
    <rect x="-50" y="80" width="100" height="15" rx="3" fill="url(#gold)"/>
    <rect x="-60" y="95" width="120" height="10" rx="3" fill="#B8860B"/>

    <!-- Star on trophy -->
    <text x="0" y="-40" text-anchor="middle" font-size="40" fill="#050505" opacity="0.3">★</text>
  </g>

  <!-- Text "2026" -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="48" font-weight="900" fill="url(#gold)" letter-spacing="4">2026</text>

  <!-- Host nation colors strip -->
  <rect x="96" y="468" width="106" height="6" fill="#006847"/>
  <rect x="202" y="468" width="108" height="6" fill="#FFFFFF"/>
  <rect x="310" y="468" width="106" height="6" fill="#BF0A30"/>
</svg>
